name: Lint GitHub workflows

on:
  pull_request:
    paths:
      - .github/workflows/*.yml
      - .github/workflows/*.yaml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint all workflow files
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 \
            -color \
            -shellcheck= \
            .github/workflows/*.yml
