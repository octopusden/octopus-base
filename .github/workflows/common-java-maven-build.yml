# This is a basic build workflow for Octopus maven Java modules
name: Maven Compile & UT

on:
  workflow_call:
    inputs:
      java-version:
        required: true
        type: string
      mvn-parameters:
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Prod

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          
      - name: Maven build
        env:
          MVN_PARAMETERS: ${{ inputs.mvn-parameters }}
        run: mvn --batch-mode --update-snapshots package $MVN_PARAMETERS
