name: Lint Release octopus-base workflow

on:
  pull_request:
    paths:
      - .github/workflows/check-octopus-test-consumer.yml
      - .github/workflows/release-octopus-base.yml
      - .github/workflows/verify-octopus-test-consumer.yml
      - .github/workflows/lint-release-octopus-base.yml
      - .github/scripts/collect-workflow-files.sh
      - .github/scripts/sync-internal-action-refs.sh
      - .github/scripts/update-octopus-test-refs.sh
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint release workflow
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 \
            -color \
            .github/workflows/check-octopus-test-consumer.yml \
            .github/workflows/release-octopus-base.yml \
            .github/workflows/verify-octopus-test-consumer.yml

      - name: Validate verification helper script
        shell: bash
        run: |
          set -euo pipefail
          bash -n .github/scripts/collect-workflow-files.sh
          bash -n .github/scripts/sync-internal-action-refs.sh
          bash -n .github/scripts/update-octopus-test-refs.sh
