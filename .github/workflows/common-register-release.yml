# Base action for registering octopus releases in the release-log
name: Register Release

on:
  workflow_call:
    inputs:
      octopus-repository:
        type: string
        required: true
      release-version:
        type: string
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Prod
    env:
      OCTOPUS_MODULE_NAME: ''

    steps:
      - name: Set module name
        id: set-module-name
        env:
          OCTOPUS_REPOSITORY: ${{ inputs.octopus-repository }}
        run: |
          echo "OCTOPUS_MODULE_NAME=$(echo "$OCTOPUS_REPOSITORY" | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: Launch action using REST
        env:
          RELEASE_VERSION: ${{ inputs.release-version }}
        run: |
          curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.OCTOPUS_GITHUB_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/octopusden/octopus-release-log/dispatches \
          -d "{ \"event_type\": \"register-release\", \"client_payload\": {\"octopus-module-name\": \"${OCTOPUS_MODULE_NAME}\", \"release-version\": \"${RELEASE_VERSION}\"} }" \
          --fail
