name: Release octopus-base

on:
  workflow_dispatch:
    inputs:
      increment-version-level:
        description: 'One of: {major, minor, patch}'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      target-ref:
        description: 'Branch to release (commit SHA allowed only with dry-run)'
        required: true
        type: string
        default: main
      dry-run:
        description: 'Validate and calculate version without creating a release'
        required: true
        type: boolean
        default: false
      verify_octopus_test:
        description: 'Run octopus-test consumer verification before creating the release'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-target:
    name: Resolve target ref
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.target-ref }}

      - name: Resolve target SHA and branch
        id: resolve
        env:
          INPUT_TARGET_REF: ${{ inputs.target-ref }}
          INPUT_DRY_RUN: ${{ inputs.dry-run }}
        shell: bash
        run: |
          set -euo pipefail

          target_sha="$(git rev-parse HEAD)"
          target_branch=""

          if [[ "$INPUT_TARGET_REF" == refs/heads/* ]]; then
            target_branch="${INPUT_TARGET_REF#refs/heads/}"
          elif git show-ref --verify --quiet "refs/remotes/origin/$INPUT_TARGET_REF"; then
            target_branch="$INPUT_TARGET_REF"
          fi

          if [[ "${INPUT_DRY_RUN}" != "true" && -z "${target_branch}" ]]; then
            echo "target-ref '${INPUT_TARGET_REF}' is not a branch." >&2
            echo "Non-dry-run releases must target a branch that exists on origin." >&2
            exit 1
          fi

          {
            echo "target_sha=$target_sha"
          } >> "$GITHUB_OUTPUT"

  verify-octopus-test:
    needs: resolve-target
    if: ${{ inputs.verify_octopus_test }}
    name: Verify octopus-test consumer
    uses: ./.github/workflows/verify-octopus-test-consumer.yml
    with:
      octopus_base_ref: ${{ needs.resolve-target.outputs.target_sha }}
    secrets:
      octopus_test_push_token: ${{ secrets.OCTOPUS_TEST_PUSH_TOKEN }}

  create-release:
    name: Create GitHub release
    needs:
      - resolve-target
      - verify-octopus-test
    if: ${{ always() && (!inputs.verify_octopus_test || needs.verify-octopus-test.result == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      next_tag: ${{ steps.version.outputs.next_tag }}
      target_sha: ${{ steps.version.outputs.target_sha }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-target.outputs.target_sha }}

      - name: Calculate next version
        id: version
        env:
          INCREMENT_LEVEL: ${{ inputs.increment-version-level }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi

          if [[ ! "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest tag '$latest_tag' has unsupported format. Expected vX.Y.Z"
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "$INCREMENT_LEVEL" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported increment level '$INCREMENT_LEVEL'"
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          target_sha=$(git rev-parse HEAD)

          {
            echo "latest_tag=$latest_tag"
            echo "next_tag=$next_tag"
            echo "release_version=${major}.${minor}.${patch}"
            echo "target_sha=$target_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure target tag does not exist
        shell: bash
        run: |
          set -euo pipefail

          next_tag="${{ steps.version.outputs.next_tag }}"
          if git ls-remote --tags origin "refs/tags/$next_tag" | grep -q .; then
            echo "Tag '$next_tag' already exists on origin"
            exit 1
          fi

      - name: Create release
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create \
            "${{ steps.version.outputs.next_tag }}" \
            --title "v${{ steps.version.outputs.release_version }}" \
            --target "${{ steps.version.outputs.target_sha }}" \
            --generate-notes \
            --notes-start-tag "${{ steps.version.outputs.latest_tag }}"

      - name: Dry run summary
        if: ${{ inputs.dry-run }}
        shell: bash
        run: |
          echo "Dry run enabled: no GitHub Release was created."
          echo "Calculated tag: ${{ steps.version.outputs.next_tag }}"

      - name: Print release details
        if: ${{ !inputs.dry-run }}
        shell: bash
        run: |
          echo "Release created:"
          echo "- From tag: ${{ steps.version.outputs.latest_tag }}"
          echo "- To tag: ${{ steps.version.outputs.next_tag }}"
          echo "- Target SHA: ${{ steps.version.outputs.target_sha }}"

  register-release-in-log:
    if: ${{ !inputs.dry-run }}
    needs: create-release
    uses: ./.github/workflows/common-register-release.yml
    name: Register release
    with:
      octopus-repository: ${{ github.repository }}
      release-version: ${{ needs.create-release.outputs.release_version }}
    secrets: inherit
