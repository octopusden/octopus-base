name: Lint GitHub workflows

on:
  pull_request:
    paths:
      - .github/workflows/**
      - .github/scripts/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint release workflow
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --entrypoint sh -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 -lc '
            set -euo pipefail
            actionlint -color $(find .github/workflows -type f \( -name "*.yml" -o -name "*.yaml" \) | sort)
          '

      - name: Validate helper scripts
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r script; do
            bash -n "$script"
          done < <(find .github/scripts -type f -name '*.sh' | sort)
