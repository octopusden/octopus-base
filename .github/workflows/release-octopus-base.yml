name: Release octopus-base

on:
  workflow_dispatch:
    inputs:
      increment-version-level:
        description: 'One of: {major, minor, patch}'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      target-ref:
        description: 'Branch to release (commit SHA allowed only with dry-run)'
        required: true
        type: string
        default: main
      dry-run:
        description: 'Validate and calculate version without creating a release'
        required: true
        type: boolean
        default: false
      verify_octopus_test:
        description: 'Run octopus-test consumer verification before creating the release'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  verify-octopus-test:
    if: ${{ inputs.verify_octopus_test }}
    name: Verify octopus-test consumer
    uses: ./.github/workflows/verify-octopus-test-consumer.yml
    with:
      octopus_base_ref: ${{ inputs.target-ref }}
    secrets:
      octopus_test_push_token: ${{ secrets.OCTOPUS_TEST_PUSH_TOKEN }}

  create-release:
    name: Create GitHub release
    needs: verify-octopus-test
    if: ${{ always() && (!inputs.verify_octopus_test || needs.verify-octopus-test.result == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      next_tag: ${{ steps.version.outputs.next_tag }}
      target_sha: ${{ steps.release-target.outputs.target_sha }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.target-ref }}

      - name: Calculate next version
        id: version
        env:
          INCREMENT_LEVEL: ${{ inputs.increment-version-level }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi

          if [[ ! "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest tag '$latest_tag' has unsupported format. Expected vX.Y.Z"
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          case "$INCREMENT_LEVEL" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported increment level '$INCREMENT_LEVEL'"
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          target_sha=$(git rev-parse HEAD)

          {
            echo "latest_tag=$latest_tag"
            echo "next_tag=$next_tag"
            echo "release_version=${major}.${minor}.${patch}"
            echo "target_sha=$target_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure target tag does not exist
        shell: bash
        run: |
          set -euo pipefail

          next_tag="${{ steps.version.outputs.next_tag }}"
          if git ls-remote --tags origin "refs/tags/$next_tag" | grep -q .; then
            echo "Tag '$next_tag' already exists on origin"
            exit 1
          fi

      - name: Sync internal action refs and push branch/tag
        if: ${{ !inputs.dry-run }}
        id: sync-internal-refs
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
          TARGET_REF: ${{ inputs.target-ref }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${NEXT_TAG}" ]]; then
            echo "NEXT_TAG is empty"
            exit 1
          fi

          target_branch="${TARGET_REF#refs/heads/}"
          if ! git ls-remote --exit-code --heads origin "${target_branch}" >/dev/null 2>&1; then
            echo "target-ref '${TARGET_REF}' is not a branch."
            echo "Release with sync requires a branch target."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          bash .github/scripts/sync-internal-action-refs.sh "$PWD" "$NEXT_TAG"

          git add .github/workflows
          if git diff --cached --quiet; then
            echo "No internal action refs changed."
          else
            git commit -m "chore(ci): sync internal action refs to ${NEXT_TAG}"
          fi

          release_target_sha="$(git rev-parse HEAD)"
          echo "release_target_sha=${release_target_sha}" >> "$GITHUB_OUTPUT"

          if git rev-parse "${NEXT_TAG}" >/dev/null 2>&1; then
            git tag -d "${NEXT_TAG}"
          fi

          git tag "${NEXT_TAG}" "${release_target_sha}"
          git push --atomic origin "HEAD:${target_branch}" "refs/tags/${NEXT_TAG}"

      - name: Resolve release target
        id: release-target
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ inputs.dry-run }}" == "true" ]]; then
            target_sha="${{ steps.version.outputs.target_sha }}"
          else
            target_sha="${{ steps.sync-internal-refs.outputs.release_target_sha }}"
          fi

          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create \
            "${{ steps.version.outputs.next_tag }}" \
            --title "v${{ steps.version.outputs.release_version }}" \
            --verify-tag \
            --generate-notes \
            --notes-start-tag "${{ steps.version.outputs.latest_tag }}"

      - name: Dry run summary
        if: ${{ inputs.dry-run }}
        shell: bash
        run: |
          echo "Dry run enabled: no GitHub Release was created."
          echo "Calculated tag: ${{ steps.version.outputs.next_tag }}"

      - name: Print release details
        if: ${{ !inputs.dry-run }}
        shell: bash
        run: |
          echo "Release created:"
          echo "- From tag: ${{ steps.version.outputs.latest_tag }}"
          echo "- To tag: ${{ steps.version.outputs.next_tag }}"
          echo "- Target SHA: ${{ steps.release-target.outputs.target_sha }}"

  register-release-in-log:
    if: ${{ !inputs.dry-run }}
    needs: create-release
    uses: ./.github/workflows/common-register-release.yml
    name: Register release
    with:
      octopus-repository: ${{ github.repository }}
      release-version: ${{ needs.create-release.outputs.release_version }}
    secrets: inherit
