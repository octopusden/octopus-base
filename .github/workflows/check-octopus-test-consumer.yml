name: Merge Gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      octopus_base_ref:
        description: 'Optional tag, branch, or SHA to verify in octopus-test'
        required: false
        type: string
        default: ''
      octopus_test_base_ref:
        description: 'Base branch in octopus-test used for the verification branch'
        required: true
        type: string
        default: main
      verify_branch:
        description: 'Optional octopus-test branch name override'
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'How long to wait for octopus-test build workflows'
        required: true
        type: number
        default: 30
      actionlint_image:
        description: 'Docker image (with tag) used for actionlint workflow linting'
        required: false
        type: string
        default: rhysd/actionlint:1.7.7

permissions:
  contents: read

jobs:
  # ---------- Required on every PR (standard taxonomy) ----------

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
        with:
          min-wrapper-count: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test plugin
        working-directory: gradle-quality-plugin
        run: ./gradlew build test --no-daemon --stacktrace

  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Static analysis and coverage gate
        working-directory: gradle-quality-plugin
        run: ./gradlew detekt ktlintCheck koverXmlReport koverVerify --no-daemon --stacktrace

  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-latest
    # `pull_request` triggers cannot supply inputs, so default explicitly.
    env:
      ACTIONLINT_IMAGE: ${{ inputs.actionlint_image || 'rhysd/actionlint:1.7.7' }}
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --entrypoint sh -v "$PWD:/repo" -w /repo "$ACTIONLINT_IMAGE" -lc '
            set -euo pipefail
            actionlint -color \
              -ignore "the runner of \".+\" action is too old to run on GitHub Actions" \
              -ignore "shellcheck reported issue in this script: SC2034:" \
              -ignore "shellcheck reported issue in this script: SC2046:" \
              -ignore "shellcheck reported issue in this script: SC2086:" \
              $(find .github/workflows -type f \( -name "*.yml" -o -name "*.yaml" \) | sort)
          '
      - name: Validate helper scripts
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r script; do
            bash -n "$script"
          done < <(find .github/scripts -type f -name '*.sh' | sort)
      - name: Validate workflow naming convention
        shell: bash
        run: bash .github/scripts/validate-workflow-naming.sh .

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate external action refs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/validate-github-action-refs.sh "$GITHUB_WORKSPACE"

  # ---------- Producer-specific: octopus-test consumer canary ----------

  consumer-verify-scope:
    name: consumer-verify-scope
    runs-on: ubuntu-latest
    outputs:
      run_verify: ${{ steps.scope.outputs.run_verify }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve consumer canary scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          run_verify=true

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

            if grep -Eq '^(\.github/actions/|\.github/workflows/|\.github/scripts/update-octopus-test-refs\.sh$)' <<<"${changed_files}"; then
              run_verify=true
            else
              run_verify=false
            fi
          fi

          echo "run_verify=${run_verify}" >> "$GITHUB_OUTPUT"

          {
            echo "### consumer-verify scope"
            echo "- run: \`${run_verify}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  consumer-verify:
    name: consumer-verify
    needs: consumer-verify-scope
    uses: ./.github/workflows/verify-octopus-test-consumer.yml
    with:
      enabled: ${{ needs.consumer-verify-scope.outputs.run_verify == 'true' }}
      octopus_base_ref: ${{ inputs.octopus_base_ref || (github.event_name == 'pull_request' && github.event.pull_request.head.sha || '') }}
      octopus_test_base_ref: ${{ inputs.octopus_test_base_ref || 'main' }}
      verify_branch: ${{ inputs.verify_branch || (github.event_name == 'pull_request' && format('verify/octopus-base-pr-{0}', github.event.pull_request.number) || '') }}
      timeout_minutes: ${{ inputs.timeout_minutes || 30 }}
    secrets:
      octopus_test_push_token: ${{ secrets.OCTOPUS_TEST_PUSH_TOKEN }}

  # ---------- Aggregate ----------

  gate-merge:
    name: gate/merge
    if: ${{ always() }}
    needs:
      - build
      - quality
      - workflow-lint
      - security
      - consumer-verify
    runs-on: ubuntu-latest
    steps:
      - name: Validate gate results
        shell: bash
        run: |
          set -euo pipefail

          results='${{ toJson(needs) }}'
          failed="$(jq -r 'to_entries[] | select(.value.result != "success") | "\(.key): \(.value.result)"' <<<"${results}")"

          {
            echo "### Merge gate results"
            jq -r 'to_entries[] | "- \(.key): \(.value.result)"' <<<"${results}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "${failed}" ]]; then
            echo "Merge gate failed:"
            echo "${failed}"
            exit 1
          fi

          echo "Merge gate passed."
