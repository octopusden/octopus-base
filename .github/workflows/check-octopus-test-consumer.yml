name: Merge Gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      octopus_base_ref:
        description: 'Optional tag, branch, or SHA to verify in octopus-test'
        required: false
        type: string
        default: ''
      octopus_test_base_ref:
        description: 'Base branch in octopus-test used for the verification branch'
        required: true
        type: string
        default: main
      verify_branch:
        description: 'Optional octopus-test branch name override'
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'How long to wait for octopus-test build workflows'
        required: true
        type: number
        default: 30

permissions:
  contents: read

jobs:
  resolve-gate-scope:
    name: gate/scope
    runs-on: ubuntu-latest
    outputs:
      run_verify: ${{ steps.scope.outputs.run_verify }}
      scope_reason: ${{ steps.scope.outputs.scope_reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve canary scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          run_verify=true
          scope_reason="manual run or non-PR event"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

            if grep -Eq '^(\.github/actions/|\.github/workflows/|\.github/scripts/update-octopus-test-refs\.sh$)' <<<"${changed_files}"; then
              run_verify=true
              scope_reason="PR changes include workflows/actions/update-octopus-test-refs.sh"
            else
              run_verify=false
              scope_reason="PR changes are outside canary-related paths"
            fi
          fi

          {
            echo "run_verify=${run_verify}"
            echo "scope_reason=${scope_reason}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Merge gate scope"
            echo "- run canary verify: \`${run_verify}\`"
            echo "- reason: ${scope_reason}"
          } >> "$GITHUB_STEP_SUMMARY"

  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect plugin changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          plugin_changed=false
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            if git diff --name-only "$base_sha" "$head_sha" | grep -q '^gradle-quality-plugin/'; then
              plugin_changed=true
            fi
          fi
          echo "plugin_changed=$plugin_changed" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        if: steps.detect.outputs.plugin_changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle
        if: steps.detect.outputs.plugin_changed == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test plugin
        if: steps.detect.outputs.plugin_changed == 'true'
        working-directory: gradle-quality-plugin
        run: ./gradlew build test detekt ktlintCheck --no-daemon --stacktrace

      - name: Quality summary
        shell: bash
        run: |
          {
            echo "### quality"
            if [[ "${{ steps.detect.outputs.plugin_changed }}" == "true" ]]; then
              echo "- gradle-quality-plugin: build + test + detekt + ktlint ✅"
            else
              echo "- No plugin changes detected; build skipped"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --entrypoint sh -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 -lc '
            set -euo pipefail
            actionlint -color \
              -ignore "the runner of \".+\" action is too old to run on GitHub Actions" \
              -ignore "shellcheck reported issue in this script: SC2034:" \
              -ignore "shellcheck reported issue in this script: SC2046:" \
              -ignore "shellcheck reported issue in this script: SC2086:" \
              $(find .github/workflows -type f \( -name "*.yml" -o -name "*.yaml" \) | sort)
          '
      - name: Validate helper scripts
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r script; do
            bash -n "$script"
          done < <(find .github/scripts -type f -name '*.sh' | sort)

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate external action refs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/validate-github-action-refs.sh "$GITHUB_WORKSPACE"

  build:
    name: build
    needs: resolve-gate-scope
    uses: ./.github/workflows/verify-octopus-test-consumer.yml
    with:
      enabled: ${{ needs.resolve-gate-scope.outputs.run_verify == 'true' }}
      octopus_base_ref: ${{ inputs.octopus_base_ref || (github.event_name == 'pull_request' && github.event.pull_request.head.sha || '') }}
      octopus_test_base_ref: ${{ inputs.octopus_test_base_ref || 'main' }}
      verify_branch: ${{ inputs.verify_branch || (github.event_name == 'pull_request' && format('verify/octopus-base-pr-{0}', github.event.pull_request.number) || '') }}
      timeout_minutes: ${{ inputs.timeout_minutes || 30 }}
    secrets:
      octopus_test_push_token: ${{ secrets.OCTOPUS_TEST_PUSH_TOKEN }}

  gate-merge:
    name: gate/merge
    if: ${{ always() }}
    needs:
      - quality
      - lint
      - security
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Validate gate results
        shell: bash
        run: |
          set -euo pipefail

          results='${{ toJson(needs) }}'
          # Merge contract is strict by design: every upstream gate must report success.
          # If a gate is not applicable, keep it as an explicit noop-success job instead of skipping it.
          failed="$(jq -r 'to_entries[] | select(.value.result != "success") | "\(.key): \(.value.result)"' <<<"${results}")"

          {
            echo "### Merge gate results"
            jq -r 'to_entries[] | "- \(.key): \(.value.result)"' <<<"${results}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "${failed}" ]]; then
            echo "Merge gate failed:"
            echo "${failed}"
            exit 1
          fi

          echo "Merge gate passed."
